[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["F", "E9", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true
follow_imports = "silent"
show_error_codes = true
pretty = true

[[tool.mypy.overrides]]
module = [
    "backend.core.points_audit_review",
    "backend.valuation.replacement",
    "backend.valuation.common_math",
    "backend.dynasty_roto_values",
]
ignore_errors = true
