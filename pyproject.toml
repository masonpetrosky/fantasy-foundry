[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["F", "E9", "I"]

[tool.ruff.lint.per-file-ignores]
"backend/dynasty_roto_values.py" = ["F401", "I001"]
"backend/runtime.py" = ["F401", "F821", "I001"]
"backend/valuation/common_orchestration.py" = ["F405"]
"backend/valuation/league_orchestration.py" = ["F405"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true
follow_imports = "silent"
show_error_codes = true
pretty = true
