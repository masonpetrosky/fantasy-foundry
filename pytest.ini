[pytest]
pythonpath = .
testpaths = tests
markers =
    e2e: browser end-to-end tests requiring Playwright + local app startup
    full_regression: high-cost regression tests excluded from the default fast CI lane
    slow: tests that take more than a few seconds to run
    integration: tests that exercise API routes via TestClient
    valuation: tests covering dynasty valuation math and assignment logic
addopts =
    --cov=backend
    --cov-branch
    --cov-report=term-missing
    --cov-fail-under=75

[coverage:run]
branch = True
source =
    backend
