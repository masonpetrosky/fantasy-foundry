name: CodeQL

# CodeQL code scanning requires GitHub Advanced Security, which is only
# available for public repos on the free plan.  While this repo is private
# the workflow is limited to manual dispatch so it doesn't send failure
# emails on every push.  Re-enable push/pull_request triggers once the repo
# is public or Advanced Security is enabled.
on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
