name: Docker Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Docker Smoke Check
        run: ./scripts/smoke_docker.sh 18000
