name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run browser E2E tests (Playwright)"
        required: false
        default: false
        type: boolean
      run_full_regression:
        description: "Run high-cost full regression backend tests"
        required: false
        default: false
        type: boolean

jobs:
  frontend-dist:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Unit Tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Enforce Frontend Asset Budgets
        run: ./scripts/check_frontend_asset_budget.sh

      - name: Verify frontend/dist is up to date
        run: |
          if ! git diff --quiet -- frontend/dist; then
            echo "frontend/dist differs from a clean build (added/modified/deleted files)."
            echo "Run './scripts/check_frontend_dist.sh', then commit the resulting frontend/dist changes."
            git --no-pager diff --name-status -- frontend/dist
            exit 1
          fi

  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce Generated Artifact Tracking Guard
        run: ./scripts/check_generated_artifacts_untracked.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Enforce Ruff Per-File Ignore Allowlist
        run: python scripts/check_ruff_per_file_ignores.py

      - name: Run Backend Lint
        run: ruff check backend tests preprocess.py scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify Browser Analytics CSV Contract
        run: python scripts/check_activation_browser_csv_contract.py

      - name: Run Frontend Lint
        working-directory: frontend
        run: npm run lint

  dependency-audit:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies + Audit Tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      - name: Audit Direct Python Dependencies
        run: python scripts/check_pip_audit_direct.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit Direct Frontend Dependencies (High/Critical)
        working-directory: frontend
        run: node ../scripts/check_npm_audit_direct.mjs

  typecheck:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Typecheck Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt mypy

      - name: Run Backend Type Checks
        run: mypy backend/api/middleware.py backend/core/settings.py backend/core/networking.py backend/core/rate_limit.py backend/core/result_cache.py backend/core/jobs.py backend/core/data_refresh.py backend/valuation/models.py backend/services/calculator/service.py

  unit-tests:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce Source File Size Guardrails
        run: python scripts/check_max_file_lines.py

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov

      - name: Run Unit + Integration Test Suite
        run: pytest -q -m "not full_regression"

  full-regression-tests:
    if: github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_full_regression)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov

      - name: Run High-Cost Full Regression Tests
        run: pytest -q -m "full_regression" --no-cov

  data-artifacts:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Preprocess Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify preprocessed data artifacts are up to date
        run: |
          python preprocess.py --quality-report tmp/projection_quality_report.json
          python scripts/check_projection_quality_report.py --report tmp/projection_quality_report.json
          if ! git diff --quiet -- data/meta.json data/bat.json data/pitch.json data/dynasty_lookup.json; then
            echo "Preprocessed data artifacts differ from committed files."
            echo "Run 'python preprocess.py' and commit updated files under data/."
            git --no-pager diff --name-status -- data/meta.json data/bat.json data/pitch.json data/dynasty_lookup.json
            exit 1
          fi

  docker-build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fantasy-foundry:ci .

  e2e-smoke:
    if: github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || inputs.run_e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend + E2E Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt pytest

      - name: Install Playwright Chromium + OS Dependencies
        run: python -m playwright install --with-deps chromium

      - name: Run Browser Smoke Test
        run: FF_RUN_E2E=1 pytest -q --no-cov tests/test_e2e_projections_pagination.py

  e2e-tests:
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend + E2E Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt pytest

      - name: Install Playwright Chromium + OS Dependencies
        run: python -m playwright install --with-deps chromium

      - name: Run Browser E2E Tests
        run: FF_RUN_E2E=1 pytest -q --no-cov tests/test_e2e_projections_pagination.py tests/test_e2e_calculator_smoke.py
