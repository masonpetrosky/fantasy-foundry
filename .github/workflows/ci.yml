name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run browser E2E tests (Playwright)"
        required: false
        default: false
        type: boolean

jobs:
  frontend-dist:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Unit Tests
        working-directory: frontend
        run: npm test

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend/dist is up to date
        run: |
          if ! git diff --quiet -- frontend/dist; then
            echo "frontend/dist differs from a clean build (added/modified/deleted files)."
            echo "Run './scripts/check_frontend_dist.sh', then commit the resulting frontend/dist changes."
            git --no-pager diff --name-status -- frontend/dist
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Backend Lint
        run: ruff check backend tests preprocess.py scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Lint
        working-directory: frontend
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce Source File Size Guardrails
        run: python scripts/check_max_file_lines.py

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run Unit + Integration Test Suite
        run: pytest -q

  data-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Preprocess Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify preprocessed data artifacts are up to date
        run: |
          python preprocess.py
          if ! git diff --quiet -- data/meta.json data/bat.json data/pitch.json data/dynasty_lookup.json; then
            echo "Preprocessed data artifacts differ from committed files."
            echo "Run 'python preprocess.py' and commit updated files under data/."
            git --no-pager diff --name-status -- data/meta.json data/bat.json data/pitch.json data/dynasty_lookup.json
            exit 1
          fi

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fantasy-foundry:ci .

  e2e-smoke:
    if: github.event_name != 'workflow_dispatch' || inputs.run_e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend + E2E Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt pytest

      - name: Install Playwright Chromium + OS Dependencies
        run: python -m playwright install --with-deps chromium

      - name: Run Browser Smoke Test
        run: FF_RUN_E2E=1 pytest -q tests/test_e2e_projections_pagination.py

  e2e-tests:
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend + E2E Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt pytest

      - name: Install Playwright Chromium + OS Dependencies
        run: python -m playwright install --with-deps chromium

      - name: Run Browser E2E Tests
        run: FF_RUN_E2E=1 pytest -q tests/test_e2e_projections_pagination.py tests/test_e2e_calculator_smoke.py
