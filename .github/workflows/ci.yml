name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run browser E2E tests (Playwright)"
        required: false
        default: false
        type: boolean
      run_full_regression:
        description: "Run high-cost full regression backend tests"
        required: false
        default: false
        type: boolean

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Detect which paths changed (always runs, ~15s)
  # ──────────────────────────────────────────────────────────────
  detect-changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce Generated Artifact Tracking Guard
        run: ./scripts/check_generated_artifacts_untracked.sh

      - name: Enforce OS Metadata Artifact Scrub
        run: ./scripts/check_os_metadata_artifacts.sh

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'tests/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'preprocess.py'
              - 'scripts/**'
              - 'data/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'scripts/check_frontend_*'
              - 'scripts/check_activation_browser_csv_contract.py'
              - 'scripts/check_npm_audit_direct.mjs'
              - 'scripts/activation_readout.py'
              - '.github/workflows/ci.yml'
            docker:
              - 'Dockerfile'
              - 'backend/**'
              - 'frontend/**'
              - 'requirements*.txt'
              - 'data/**'
              - '.dockerignore'
            e2e:
              - 'frontend/**'
              - 'backend/**'
              - 'tests/test_e2e_*'
              - 'requirements*.txt'

  # ──────────────────────────────────────────────────────────────
  # Job 2: All backend quality gates in one job
  # Replaces: lint (backend), typecheck, unit-tests, dependency-audit (pip), data-artifacts
  # ──────────────────────────────────────────────────────────────
  backend-quality:
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      ((github.event_name == 'pull_request' || github.event_name == 'push') && needs.detect-changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install All Backend Dependencies + Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff mypy pip-audit pytest pytest-cov

      # --- Fast lint gates first (fail early) ---

      - name: Enforce Ruff Per-File Ignore Allowlist
        run: python scripts/check_ruff_per_file_ignores.py

      - name: Run Backend Lint
        run: ruff check backend tests preprocess.py scripts

      - name: Enforce Source File Size Guardrails
        run: python scripts/check_max_file_lines.py

      - name: Run Backend Type Checks
        run: make typecheck

      # --- Dependency audit ---

      - name: Audit Direct Python Dependencies
        run: python scripts/check_pip_audit_direct.py

      # --- Tests ---

      - name: Run Unit + Integration Test Suite
        run: pytest -q -m "not full_regression"

      # --- Data artifact freshness ---

      - name: Verify preprocessed data artifacts are up to date
        run: |
          python preprocess.py --quality-report tmp/projection_quality_report.json
          python scripts/check_projection_quality_report.py --report tmp/projection_quality_report.json
          if ! git diff --quiet -- data/meta.json data/bat.json data/pitch.json data/dynasty_lookup.json; then
            echo "Preprocessed data artifacts differ from committed files."
            echo "Run 'python preprocess.py' and commit updated files under data/."
            git --no-pager diff --name-status -- data/meta.json data/bat.json data/pitch.json data/dynasty_lookup.json
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 3: All frontend quality gates in one job
  # Replaces: frontend-dist, lint (frontend), dependency-audit (npm)
  # ──────────────────────────────────────────────────────────────
  frontend-quality:
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      ((github.event_name == 'pull_request' || github.event_name == 'push') && needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python (for CSV contract check)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      # --- Fast gates first ---

      - name: Run Frontend Unit Tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Run Frontend Lint
        working-directory: frontend
        run: npm run lint

      # --- Build + dist verification ---

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Enforce Frontend Asset Budgets
        run: ./scripts/check_frontend_asset_budget.sh

      - name: Verify frontend/dist is up to date
        run: |
          if ! git diff --quiet -- frontend/dist; then
            echo "frontend/dist differs from a clean build (added/modified/deleted files)."
            echo "Run './scripts/check_frontend_dist.sh', then commit the resulting frontend/dist changes."
            git --no-pager diff --name-status -- frontend/dist
            exit 1
          fi

      # --- Contract + audit ---

      - name: Verify Browser Analytics CSV Contract
        run: python scripts/check_activation_browser_csv_contract.py

      - name: Audit Direct Frontend Dependencies (High/Critical)
        working-directory: frontend
        run: node ../scripts/check_npm_audit_direct.mjs

  # ──────────────────────────────────────────────────────────────
  # Job 3b: Lighthouse CI — frontend performance & accessibility
  # ──────────────────────────────────────────────────────────────
  lighthouse:
    needs: [detect-changes, frontend-quality]
    if: |
      github.event_name == 'workflow_dispatch' ||
      ((github.event_name == 'pull_request' || github.event_name == 'push') && needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: .lighthouserc.json

  # ──────────────────────────────────────────────────────────────
  # Job 4: Docker build — PR only, path-filtered
  # ──────────────────────────────────────────────────────────────
  docker-build:
    needs: detect-changes
    if: |
      ((github.event_name == 'pull_request' || github.event_name == 'push') && needs.detect-changes.outputs.docker == 'true') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fantasy-foundry:ci .

  # ──────────────────────────────────────────────────────────────
  # Job 5: E2E smoke — PR only, path-filtered, Playwright cached
  # ──────────────────────────────────────────────────────────────
  e2e-smoke:
    needs: detect-changes
    if: |
      ((github.event_name == 'pull_request' || github.event_name == 'push') && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true')) ||
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Backend + E2E Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt pytest

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}

      - name: Install Playwright Chromium + OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright OS Dependencies (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run Browser Smoke Tests
        run: FF_RUN_E2E=1 pytest -q --no-cov tests/test_e2e_projections_pagination.py tests/test_e2e_calculator_smoke.py

  # ──────────────────────────────────────────────────────────────
  # Job 6: Full regression — push to main / schedule / manual
  # ──────────────────────────────────────────────────────────────
  full-regression-tests:
    if: github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_full_regression)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov

      - name: Run High-Cost Full Regression Tests
        run: pytest -q -m "full_regression" --no-cov

  # ──────────────────────────────────────────────────────────────
  # Job 7: Full E2E suite — manual dispatch only
  # ──────────────────────────────────────────────────────────────
  e2e-tests:
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Backend + E2E Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt pytest

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}

      - name: Install Playwright Chromium + OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright OS Dependencies (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run Browser E2E Tests
        run: FF_RUN_E2E=1 pytest -q --no-cov tests/test_e2e_projections_pagination.py tests/test_e2e_calculator_smoke.py
